services:
  db:
    image: postgres:16-alpine
    container_name: bootcamp-treinos-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bootcamp-treinos-api
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
